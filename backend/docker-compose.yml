# ============================================================================
# 3C数码零售系统 · docker-compose.yml
# ============================================================================

services:
  # ==================== 应用服务 ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: 3c-retail-api:latest
    container_name: 3c-retail-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - APP_NAME=3c-retail-api
      - APP_PORT=3000
      - APP_ENV=production
      - DATABASE_URL=mysql://${MYSQL_USER:-3capp}:${MYSQL_PASSWORD:?required}@mysql:3306/${MYSQL_DATABASE:-3c_retail}?charset=utf8mb4&connection_limit=20
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?required}
      - REDIS_DB=0
      - JWT_SECRET=${JWT_SECRET:?required}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-8h}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-false}
      - SWAGGER_AUTH=${SWAGGER_AUTH:-false}
      - DIFY_BASE_URL=${DIFY_BASE_URL:-}
      - DIFY_API_KEY=${DIFY_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - app-logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1g
        reservations:
          cpus: "0.5"
          memory: 512m

  # ==================== Nginx ====================
  nginx:
    image: nginx:1.27-alpine
    container_name: 3c-retail-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - SWAGGER_AUTH=${SWAGGER_AUTH:-false}
      - SWAGGER_USER=${SWAGGER_USER:-admin}
      - SWAGGER_PASS=${SWAGGER_PASS:-}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - ./nginx/ssl-init.sh:/docker-entrypoint.d/40-ssl-init.sh:ro
      - ./nginx/htpasswd-init.sh:/docker-entrypoint.d/41-htpasswd-init.sh:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ==================== MySQL 8 ====================
  mysql:
    image: mysql:8.0
    container_name: 3c-retail-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:?required}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-3c_retail}
      - MYSQL_USER=${MYSQL_USER:-3capp}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:?required}
      - MYSQL_PWD=${MYSQL_ROOT_PASSWORD:?required}
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=256M
      --slow-query-log=1
      --slow-query-log-file=/var/lib/mysql/slow-query.log
      --long-query-time=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: 3c-retail-redis
    restart: unless-stopped
    expose:
      - "6379"
    environment:
      - REDISCLI_AUTH=${REDIS_PASSWORD:?required}
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASSWORD:?required}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    sysctls:
      - net.core.somaxconn=1024

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  app-logs:
    driver: local
