# ============================================================================
# 3C数码零售系统 · Redis 配置
# ============================================================================

# 绑定内网接口
bind 0.0.0.0

# 保护模式 (docker-compose 走内网，不需要)
protected-mode no

port 6379

# 持久化: RDB
save 900 1
save 300 10
save 60 10000

# 持久化: AOF
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 内存限制
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志
loglevel notice
logfile ""

# 连接
tcp-backlog 511
timeout 300
tcp-keepalive 300

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128
