# ============================================================================
# 3C数码零售系统 · Nginx 配置
# 目标: 反向代理 + HTTPS + 限流 + 安全头
# ============================================================================

worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
  use epoll;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ---- 基础优化 ----
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  server_tokens   off;
  keepalive_timeout 65;

  # ---- 日志格式 (JSON, 适配腾讯云 CLS) ----
  log_format json_combined escape=json '{'
    '"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"x_forwarded_for":"$http_x_forwarded_for",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time"'
  '}';

  access_log /var/log/nginx/access.log json_combined buffer=32k flush=5s;
  error_log  /var/log/nginx/error.log warn;

  # ---- Gzip ----
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
  gzip_min_length 1024;

  # ---- 限流区域 ----
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # ---- 上游 ----
  upstream app_cluster {
    least_conn;
    server app:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  # ---- HTTP → HTTPS 重定向 ----
  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ---- HTTPS 主站 ----
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    client_max_body_size 10m;

    # ---- SSL 证书 (腾讯云 SSL 服务) ----
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ---- TLS 安全配置 (Mozilla Intermediate) ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 119.29.29.29 182.254.116.116 valid=300s;

    # ---- 安全头 ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ---- 代理缓存 ----
    proxy_cache off;

    # ---- 根路径 ----
    location = / {
      return 200 '{"service":"3c-retail-api","status":"running"}';
      add_header Content-Type application/json;
    }

    # ---- API 路由 ----
    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;
      limit_conn conn_limit 20;

      proxy_pass http://app_cluster;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
      proxy_connect_timeout 5s;
      proxy_next_upstream error timeout invalid_header http_502 http_503;

      proxy_buffer_size 4k;
      proxy_buffers 8 16k;
      proxy_busy_buffers_size 32k;
    }

    # ---- 登录/注册路由 (更严格的限流) ----
    location /api/v1/auth/ {
      limit_req zone=auth_limit burst=5 nodelay;

      proxy_pass http://app_cluster;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";
    }

    # ---- Swagger 文档 ----
    location /api/docs {
      proxy_pass http://app_cluster;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection "";

      auth_basic "API Documentation";
      auth_basic_user_file /etc/nginx/.htpasswd;
    }
  }
}
